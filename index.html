<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoardCompanions — Matching Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #C41E3A; --dark: #0F0F0F; --light: #F8F7F4;
    --border: #E5E2DC; --green: #2D7A4F; --amber: #B87A1A;
    --gray: #6B6B6B; --card: #FFFFFF;
  }
  body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }

  .hero { background: var(--dark); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .hero-right { text-align: right; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: white; margin-top: 0.5rem; }
  .hero-sub { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 0.25rem; }

  .main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 3rem; }

  .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gray); margin-bottom: 0.75rem; }

  .form-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group label { font-size: 0.78rem; font-weight: 500; color: var(--dark); }
  .form-group input, .form-group select, .form-group textarea {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.875rem;
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    color: var(--dark);
    background: white;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--red); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group.full { grid-column: 1 / -1; }

  .btn-match {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    padding: 0.875rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    margin-top: 1rem;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .btn-match:hover { opacity: 0.9; }
  .btn-match:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .results-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
  .results-sub { font-size: 0.78rem; color: var(--gray); }

  .match-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    transition: box-shadow 0.2s;
  }
  .match-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .match-rank {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 0.85rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .rank-1 { background: #FFF4E0; color: #B87A1A; }
  .rank-2 { background: #F0F0F0; color: #555; }
  .rank-3 { background: #FFF0EE; color: #C41E3A; }
  .rank-4, .rank-5 { background: var(--light); color: var(--gray); }

  .match-info { flex: 1; }
  .match-name { font-weight: 600; font-size: 0.95rem; color: var(--dark); margin-bottom: 0.25rem; }
  .match-reason { font-size: 0.8rem; color: var(--gray); line-height: 1.6; margin-bottom: 0.5rem; }
  .match-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--light); color: var(--gray); border: 0.5px solid var(--border); }
  .tag-match { background: #E1F5EE; color: #085041; border-color: #A8D5B8; }

  .match-score { text-align: right; flex-shrink: 0; }
  .score-value { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 500; }
  .score-label { font-size: 0.68rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; }

  .match-actions { display: flex; flex-direction: column; gap: 0.4rem; margin-left: 0.5rem; }
  .btn-action { font-size: 0.72rem; padding: 0.3rem 0.7rem; border-radius: 6px; border: 1px solid var(--border); background: white; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; transition: all 0.2s; }
  .btn-action:hover { background: var(--light); }
  .btn-action.primary { background: var(--red); color: white; border-color: var(--red); }
  .btn-action.primary:hover { opacity: 0.9; }

  .loading-state { display: none; text-align: center; padding: 3rem; }
  .loading-state p { color: var(--gray); font-size: 0.85rem; margin-top: 1rem; }

  .no-results { text-align: center; padding: 2rem; color: var(--gray); font-size: 0.85rem; }

  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>

  </div>

  <div class="results" id="results">
    <div class="results-header">
      <div>
        <div class="results-title" id="results-title">Best matches for <span id="results-org"></span></div>
        <div class="results-sub" id="results-sub"></div>
      </div>
      <button onclick="resetForm()" style="font-size:0.78rem;padding:0.4rem 0.8rem;border:1px solid var(--border);border-radius:8px;background:white;cursor:pointer;font-family:Inter,sans-serif">← New search</button>
    </div>
    <div id="matches-list"></div>
  </div>

</main>

<script>
  const API_KEY = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY3NDc2NTk3OCwiYWFpIjoxMSwidWlkIjoxMDQ2MTY2MzMsImlhZCI6IjIwMjYtMDYtMjRUMTA6NDg6MzkuNzcwWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjM1Mzk4NTM2LCJyZ24iOiJldWMxIn0.2PmOez-KyimI6xQIlCVo4xZugFR6nYr0_cpe_STl8B4';
  const CONTACTS_BOARD = '5099121389';

  async function queryMonday(q) {
    const res = await fetch('/.netlify/functions/monday', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q })
    });
    return res.json();
  }

  async function findMatches() {
    const orgName = document.getElementById('org-name').value.trim();
    const sector = document.getElementById('org-sector').value;
    const type = document.getElementById('org-type').value;
    const language = document.getElementById('org-language').value;
    const challenge = document.getElementById('org-challenge').value.trim();
    const expertise = document.getElementById('org-expertise').value.trim();
    const time = document.getElementById('org-time').value;
    const numMatches = parseInt(document.getElementById('org-matches').value);

    if (!orgName) { alert('Please enter an organisation name.'); return; }
    if (!challenge && !expertise) { alert('Please describe the challenges or expertise needed.'); return; }

    // Show loading
    document.getElementById('btn-match').disabled = true;
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('btn-text').textContent = 'Finding matches...';
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('results').style.display = 'none';

    try {
      // Fetch all companions from Monday
      const data = await queryMonday(`{
        boards(ids: [$5099121389]) {
          items_page(limit: 500) {
            items {
              id
              name
              column_values {
                id
                text
              }
            }
          }
        }
      }`);

      const companions = data.data.boards[0].items_page.items;

      // Score each companion
      const orgProfile = `${sector} ${type} ${challenge} ${expertise} ${language}`.toLowerCase();
      const keywords = orgProfile.split(/\s+/).filter(w => w.length > 3);

      const scored = companions.map(companion => {
        const cols = companion.column_values;
        const getCol = (id) => (cols.find(c => c.id === id) || {}).text || '';

        const sectorPref = getCol('text_mm4m2csx').toLowerCase();
        const typePref = getCol('text_mm4m1frz').toLowerCase();
        const motivatie = getCol('long_text_mm4m73k').toLowerCase();
        const focus = getCol('text_mm4mmwsn').toLowerCase();
        const governance = getCol('long_text_mm4mb9az').toLowerCase();
        const taal = getCol('text_mm4mv4fj').toLowerCase();
        const beschikbaar = getCol('text_mm4mfd6r').toLowerCase();

        const profile = `${sectorPref} ${typePref} ${motivatie} ${focus} ${governance} ${taal}`;

        let score = 0;
        let matchReasons = [];
        let matchTags = [];

        // Score keywords
        keywords.forEach(kw => {
          if (profile.includes(kw)) {
            score += 2;
          }
        });

        // Sector match
        if (sector && sectorPref.includes(sector.toLowerCase().split(' ')[0])) {
          score += 15;
          matchReasons.push('Sector preference aligns');
          matchTags.push('Sector match');
        }

        // Type match
        if (type && typePref.includes(type.toLowerCase().split(' ')[0])) {
          score += 10;
          matchTags.push('Organisation type match');
        }

        // Language match
        if (language && taal.includes(language.toLowerCase().split(' ')[0])) {
          score += 8;
          matchTags.push('Language match');
        }

        // Expertise keywords
        const expertiseWords = expertise.toLowerCase().split(/[,\s]+/).filter(w => w.length > 3);
        expertiseWords.forEach(kw => {
          if (governance.includes(kw) || focus.includes(kw) || motivatie.includes(kw)) {
            score += 5;
            if (!matchTags.includes('Expertise match')) matchTags.push('Expertise match');
          }
        });

        // Challenge keywords
        const challengeWords = challenge.toLowerCase().split(/[,\s]+/).filter(w => w.length > 3);
        challengeWords.forEach(kw => {
          if (governance.includes(kw) || focus.includes(kw)) {
            score += 3;
          }
        });

        // Build reason text
        if (focus) matchReasons.push(`Focus areas: ${focus.slice(0, 80)}${focus.length > 80 ? '...' : ''}`);
        if (governance) matchReasons.push(`Experience: ${governance.slice(0, 100)}${governance.length > 100 ? '...' : ''}`);

        return {
          id: companion.id,
          name: companion.name,
          score: Math.min(99, Math.round(score)),
          reasons: matchReasons,
          tags: matchTags,
          language: taal,
          availability: beschikbaar
        };
      });

      // Sort by score
      scored.sort((a, b) => b.score - a.score);
      const topMatches = scored.slice(0, numMatches);

      // Show results
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('results').style.display = 'block';
      document.getElementById('results-org').textContent = orgName;
      document.getElementById('results-sub').textContent = `Top ${numMatches} matches from ${companions.length} Companions — ${sector || 'All sectors'}`;

      const list = document.getElementById('matches-list');
      list.innerHTML = '';

      if (topMatches.length === 0) {
        list.innerHTML = '<div class="no-results">No matches found. Try broadening your search criteria.</div>';
        return;
      }

      topMatches.forEach((match, i) => {
        const rankClass = `rank-${i+1}`;
        const scoreColor = match.score >= 60 ? '#2D7A4F' : match.score >= 30 ? '#B87A1A' : '#888780';
        
        const tagsHtml = match.tags.map(t => `<span class="tag tag-match">${t}</span>`).join('');
        const reasonText = match.reasons.slice(0,2).join(' · ') || 'General governance experience';

        list.innerHTML += `
          <div class="match-card">
            <div class="match-rank ${rankClass}">#${i+1}</div>
            <div class="match-info">
              <div class="match-name">${match.name}</div>
              <div class="match-reason">${reasonText}</div>
              <div class="match-tags">
                ${tagsHtml}
                ${match.language ? `<span class="tag">${match.language}</span>` : ''}
                ${match.availability ? `<span class="tag">${match.availability}</span>` : ''}
              </div>
            </div>
            <div class="match-score">
              <div class="score-value" style="color:${scoreColor}">${match.score}</div>
              <div class="score-label">Match score</div>
            </div>
            <div class="match-actions">
              <button class="btn-action primary" onclick="contactCompanion('${match.name}')">Contact</button>
              <button class="btn-action" onclick="viewProfile('${match.id}')">Profile</button>
            </div>
          </div>`;
      });

    } catch(e) {
      document.getElementById('loading-state').innerHTML = '<p style="color:#C41E3A">Unable to load Companion data. Please try again.</p>';
      console.error(e);
    } finally {
      document.getElementById('btn-match').disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-text').textContent = 'Find matching Companions';
    }
  }

  function contactCompanion(name) {
    alert(`Contact request for: ${name}\n\nIn the next version this will automatically send an email and create a mandate in Monday CRM.`);
  }

  function viewProfile(id) {
    window.open(`https://boardcompanions.monday.com/boards/$5099121389/pulses/${id}`, '_blank');
  }

  function resetForm() {
    document.getElementById('results').style.display = 'none';
    document.getElementById('org-name').value = '';
    document.getElementById('org-sector').value = '';
    document.getElementById('org-type').value = '';
    document.getElementById('org-language').value = '';
    document.getElementById('org-challenge').value = '';
    document.getElementById('org-expertise').value = '';
  }
</script>

</body>
</html>
